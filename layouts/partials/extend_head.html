{{- /* Head custom content area start */ -}}
{{- /* Can be overwritten by partial with the same name in the global layouts. */ -}}

<meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">

<style>
    /* 鼠标悬停封面图预览 */
    .cover-preview {
        position: fixed;
        pointer-events: none;
        z-index: 9999;
        width: 200px;
        height: 267px;
        border-radius: 12px;
        overflow: hidden;
        opacity: 0;
        transform: scale(0.85) translateY(8px);
        transition: opacity 0.25s cubic-bezier(0.4, 0, 0.2, 1),
            transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.25),
            0 4px 12px rgba(0, 0, 0, 0.15);
        border: 2px solid rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(4px);
    }
    .cover-preview.visible {
        opacity: 1;
        transform: scale(1) translateY(0);
    }
    .cover-preview img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }
    .dark .cover-preview {
        border-color: rgba(255, 255, 255, 0.1);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5),
            0 4px 12px rgba(0, 0, 0, 0.35);
    }
    @media (max-width: 768px) {
        .cover-preview {
            display: none !important;
        }
    }
</style>

<!-- Pagefind 搜索 -->
<link href="/pagefind/pagefind-ui.css" rel="stylesheet">
<script src="/pagefind/pagefind-ui.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var input = document.getElementById('nav-search-input');
    var results = document.getElementById('nav-search-results');
    if (!input || !results) return;
    var initialized = false;
    var debounceTimer;
    input.addEventListener('focus', function() {
        if (!initialized) {
            new PagefindUI({ element: "#nav-search-results", showSubResults: true });
            initialized = true;
        }
    });
    input.addEventListener('input', function() {
        clearTimeout(debounceTimer);
        var val = input.value;
        debounceTimer = setTimeout(function() {
            var pfInput = results.querySelector('.pagefind-ui__search-input');
            if (pfInput) {
                pfInput.value = val;
                pfInput.dispatchEvent(new Event('input', { bubbles: true }));
            }
            results.classList.toggle('active', val.length > 0);
        }, 200);
    });
    document.addEventListener('click', function(e) {
        if (!input.contains(e.target) && !results.contains(e.target)) {
            results.classList.remove('active');
        }
    });
    input.addEventListener('focus', function() {
        if (input.value.length > 0) results.classList.add('active');
    });
});
</script>

{{- /* Head custom content area end */ -}}
